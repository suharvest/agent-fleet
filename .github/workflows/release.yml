name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.package }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            package: agent-fleet-linux-x86_64
            archive: tar.gz
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            package: agent-fleet-linux-aarch64
            archive: tar.gz
          - os: macos-15-intel
            target: x86_64-apple-darwin
            package: agent-fleet-macos-x86_64
            archive: tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            package: agent-fleet-macos-aarch64
            archive: tar.gz
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            package: agent-fleet-windows-x86_64
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Test
        run: cargo test --locked --target ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }} --bin fleet --bin rpty

      - name: Package Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          package="${{ matrix.package }}"
          staging="dist/${package}"
          mkdir -p "${staging}/docs" "${staging}/scripts" "${staging}/fleet_backend"
          cp "target/${{ matrix.target }}/release/fleet" "${staging}/fleet"
          cp "target/${{ matrix.target }}/release/rpty" "${staging}/rpty"
          cp README.md LICENSE "${staging}/"
          cp scripts/install.sh scripts/install.ps1 "${staging}/scripts/"
          cp docs/getting-started.md docs/release.md "${staging}/docs/"
          cp fleet_backend/bootstrap.sh fleet_backend/devices.example.json "${staging}/fleet_backend/"
          cp fleet_backend/fleet.py fleet_backend/pyproject.toml fleet_backend/uv.lock "${staging}/fleet_backend/"
          chmod +x "${staging}/fleet" "${staging}/rpty" "${staging}/scripts/install.sh"
          tar -C dist -czf "dist/${package}.tar.gz" "${package}"
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 "dist/${package}.tar.gz" > "dist/${package}.tar.gz.sha256"
          else
            sha256sum "dist/${package}.tar.gz" > "dist/${package}.tar.gz.sha256"
          fi

      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $package = "${{ matrix.package }}"
          $staging = "dist/$package"
          New-Item -ItemType Directory -Force -Path "$staging/docs", "$staging/scripts", "$staging/fleet_backend" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/fleet.exe" "$staging/fleet.exe"
          Copy-Item "target/${{ matrix.target }}/release/rpty.exe" "$staging/rpty.exe"
          Copy-Item README.md, LICENSE "$staging/"
          Copy-Item scripts/install.sh, scripts/install.ps1 "$staging/scripts/"
          Copy-Item docs/getting-started.md, docs/release.md "$staging/docs/"
          Copy-Item fleet_backend/bootstrap.sh, fleet_backend/devices.example.json "$staging/fleet_backend/"
          Copy-Item fleet_backend/fleet.py, fleet_backend/pyproject.toml, fleet_backend/uv.lock "$staging/fleet_backend/"
          Compress-Archive -Path $staging -DestinationPath "dist/$package.zip" -Force
          $hash = Get-FileHash "dist/$package.zip" -Algorithm SHA256
          "$($hash.Hash.ToLowerInvariant())  $package.zip" | Set-Content "dist/$package.zip.sha256"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package }}
          path: |
            dist/${{ matrix.package }}.${{ matrix.archive }}
            dist/${{ matrix.package }}.${{ matrix.archive }}.sha256

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
